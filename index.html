<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic-Tac-Toe</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#222;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
}

h1{
    margin-bottom:20px;
}

.board{
    display:grid;
    grid-template-columns:repeat(3,100px);
    gap:10px;
    justify-content:center;
}

.cell{
    width:100px;
    height:100px;
    background:white;
    color:black;
    font-size:40px;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    border-radius:8px;
}

.cell:hover{
    background:#ddd;
}

#status{
    margin:20px;
    font-size:22px;
}

button{
    padding:10px 20px;
    font-size:18px;
    cursor:pointer;
    border:none;
    border-radius:5px;
}
</style>

</head>
<body>

<div class="container">
    <h1>Tic-Tac-Toe</h1>

    <div class="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>

    <p id="status">Player X Turn</p>

    <button onclick="restartGame()">Restart</button>
</div>

<script>

const cells=document.querySelectorAll(".cell");
const status=document.getElementById("status");

let currentPlayer="X";
let board=["","","","","","","","",""];
let gameActive=true;

const winPatterns=[
[0,1,2],
[3,4,5],
[6,7,8],
[0,3,6],
[1,4,7],
[2,5,8],
[0,4,8],
[2,4,6]
];

cells.forEach(cell=>{
    cell.addEventListener("click",cellClick);
});

function cellClick(){

    const index=this.dataset.index;

    if(board[index]!=="" || !gameActive)
        return;

    board[index]=currentPlayer;
    this.textContent=currentPlayer;

    checkWinner();

}

function checkWinner(){

    for(let pattern of winPatterns){

        let a=board[pattern[0]];
        let b=board[pattern[1]];
        let c=board[pattern[2]];

        if(a==="" || b==="" || c==="")
            continue;

        if(a===b && b===c){
            status.textContent="🎉 Player "+currentPlayer+" Wins!";
            gameActive=false;
            return;
        }
    }

    if(!board.includes("")){
        status.textContent="🤝 Match Draw!";
        gameActive=false;
        return;
    }

    currentPlayer=currentPlayer==="X"?"O":"X";
    status.textContent="Player "+currentPlayer+" Turn";
}

function restartGame(){

    board=["","","","","","","","",""];
    gameActive=true;
    currentPlayer="X";
    status.textContent="Player X Turn";

    cells.forEach(cell=>{
        cell.textContent="";
    });

}

</script>

</body>
</html>
